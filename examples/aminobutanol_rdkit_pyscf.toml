# pKa prediction for 3-amino-2-butanol
# Sampling: RDKit-first | Driver: PySCF
#
# Three-stage workflow:
#   1. Sampling   — RDKit tautomer/charge enum + CREST conformers (GFN2-xTB)
#   2. Refinement — geometry optimization (wB97X-3c/vDZP + SS(V)PE) + xTB RRHO
#   3. Scoring    — single-point energy (wB97M-V/def2-QZVPPD + SS(V)PE)

[molecule]
smiles = "CC(O)C(N)C"
charge_min = -2
charge_max = 2

[sampling]
approach = "rdkit_first"
ewin = 10.0

[refinement]
# PySCF defaults: wB97X-3c / vDZP / SS(V)PE
solvent = "water"
ewin = 10.0
rrho_method = "xtb"

[scoring]
# PySCF defaults: wB97M-V / def2-QZVPPD / SS(V)PE
solvent = "water"
ewin = 10.0

[compute]
driver = "pyscf"
threads = 8
output_dir = "aminobutanol_rdkit_pyscf_output"
