[workspace]
channels = ["conda-forge"]
name = "qm-pka"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
lint = "ruff check qm_pka/ tests/ scripts/"
format = "ruff format qm_pka/ tests/ scripts/"
format-check = "ruff format --check qm_pka/ tests/ scripts/"
typecheck = "mypy qm_pka/ tests/ scripts/"
check = { depends-on = ["lint", "format-check", "typecheck"] }

[dependencies]
crest = ">=3.0.2,<4"
gcp-correction = ">=2.3.2,<3"
psi4 = ">=1.10,<2"
rdkit = ">=2024.03,<2026"
# NOTE: gcp-correction pins mctc-lib <0.4, forcing xtb to an old build with a Fortran
# format string bug. We pass -newversion to all CREST commands so it uses its internal
# tblite backend instead of the standalone xtb binary, avoiding the bug entirely.
pytest = ">=9.0.3,<10"
mypy = ">=1.20.0,<2"

[pypi-dependencies]
qm-pka = { path = ".", editable = true }
ruff = ">=0.11,<1"
# PySCF for DFT optimization with implicit solvation (PCM).
# Psi4: wB97X-3c (gas-phase only — no analytical PCM gradients available).
# PySCF: wB97X-D3BJ + PCM (ddCOSMO) — supports analytical solvation gradients,
#   so we can optimize geometries in implicit solvent. Comparing both backends
#   lets us evaluate speed vs predictive accuracy for pKa.
pyscf = { version = ">=2.7,<3", extras = ["dispersion"] }
