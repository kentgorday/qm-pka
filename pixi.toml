[workspace]
channels = ["conda-forge"]
name = "qm-pka"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
lint = "ruff check qm_pka/ tests/ scripts/"
format = "ruff format qm_pka/ tests/ scripts/"
format-check = "ruff format --check qm_pka/ tests/ scripts/"
typecheck = "mypy qm_pka/ tests/ scripts/"
check = { depends-on = ["lint", "format-check", "typecheck"] }

[dependencies]
crest = ">=3.0.2,<4"
gcp-correction = ">=2.3.2,<3"
# Floor xtb at 6.7.1. gcp-correction 2.3.2 build 2 requires mctc-lib >=0.5.1; without
# this floor the solver falls back to xtb 6.4.1 (the last release with no mctc-lib
# dependency) instead of the newer builds rebuilt against mctc-lib 0.5.x. xtb 6.7.1
# build >=4 also fixes the build-2 Fortran format-string bug (grimme-lab/xtb#1332).
xtb = ">=6.7.1"
psi4 = ">=1.10,<2"
rdkit = ">=2024.03,<2026"
pytest = ">=9.0.3,<10"
mypy = ">=1.20.0,<2"
# DFT backends: Psi4 (subprocess) and PySCF (Python library).
# Psi4: wB97X-3c gas-phase (no analytical PCM gradients).
# PySCF: wB97X-3c/vDZP (default refinement) or wB97M-V + SMD (scoring).
pyscf = ">=2.7,<3"
# Dispersion corrections: dftd3-python and dftd4-python provide the shared
# libraries used by both Psi4 and PySCF. pyscf-dispersion is the PySCF
# extension that bridges PySCF's XC string parsing to these libraries.
dftd3-python = ">=1.0"
dftd4-python = ">=4.0"
pyscf-dispersion = ">=1.0"
# Basis set exchange: provides vDZP basis set for wB97X-3c (not in PySCF's
# built-in basis library).
basis_set_exchange = ">=0.12,<0.13"
# geomeTRIC: geometry optimizer used by PySCF for DFT refinement stage.
geometric = ">=1.0"

[pypi-dependencies]
qm-pka = { path = ".", editable = true }
ruff = ">=0.11,<1"
