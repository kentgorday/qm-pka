# pKa prediction for 3-amino-2-butanol
# Sampling: CREST-first | Driver: PySCF
#
# Three-stage workflow:
#   1. Sampling   — CREST physics-based tautomer/charge enum + conformers (GFN2-xTB)
#   2. Refinement — geometry optimization (wB97X-3c/vDZP + SS(V)PE)
#   3. Scoring    — single-point energy + RRHO (wB97M-V/def2-QZVPPD + SS(V)PE)

[molecule]
smiles = "CC(O)C(N)C"
charge_min = -2
charge_max = 2

[sampling]
approach = "crest_first"
ewin = 10.0
prescreen_ewin = 6.0
prescreen_mode = "quick"
full_mode = "default"

[refinement]
# PySCF defaults: wB97X-3c / vDZP / SS(V)PE
solvent = "water"
ewin = 10.0

[scoring]
# PySCF defaults: wB97M-V / def2-QZVPPD / SS(V)PE
solvent = "water"
ewin = 10.0
rrho_level = "refinement"

[compute]
driver = "pyscf"
threads = 8
output_dir = "aminobutanol_crest_pyscf_output"
