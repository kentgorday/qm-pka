[workspace]
channels = ["conda-forge"]
name = "qm-pka"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
lint = "ruff check qm_pka/ tests/ scripts/"
format = "ruff format qm_pka/ tests/ scripts/"
format-check = "ruff format --check qm_pka/ tests/ scripts/"
typecheck = "mypy qm_pka/ tests/ scripts/"
check = { depends-on = ["lint", "format-check", "typecheck"] }

[dependencies]
crest = ">=3.0.2,<4"
# gcp-correction = ">=2.3.2,<3"  # disabled: pins mctc-lib <0.4, forcing xtb build 2 which has
# a Fortran format string bug (github.com/grimme-lab/xtb/issues/1332). Re-enable when gcp-correction
# updates its mctc-lib constraint to allow >=0.4.
psi4 = ">=1.10,<2"
rdkit = ">=2024.03,<2026"
xtb = { version = ">=6.7.1,<7", build = "*_4" }  # build 4+ fixes Fortran format string bug
pytest = ">=9.0.3,<10"
mypy = ">=1.20.0,<2"

[pypi-dependencies]
qm-pka = { path = ".", editable = true }
ruff = ">=0.11,<1"
