# pKa prediction for glycine using PySCF backend
#
# Three-stage workflow:
#   1. Sampling   — CREST conformer/tautomer/protonation enumeration (GFN2-xTB)
#   2. Refinement — geometry optimization (wB97X-3c/vDZP + SS(V)PE) + xTB RRHO
#   3. Scoring    — single-point energy (wB97M-V/def2-QZVPPD + SS(V)PE)

[molecule]
smiles = "NCC(=O)O"
charge_min = -1
charge_max = 1

[sampling]
approach = "rdkit_first"
ewin = 6.0

[refinement]
# PySCF defaults: wB97X-3c / vDZP / SS(V)PE
solvent = "water"
ewin = 10.0
rrho_method = "xtb"

[scoring]
# PySCF defaults: wB97M-V / def2-QZVPPD / SS(V)PE
solvent = "water"
ewin = 10.0

[compute]
driver = "pyscf"
threads = 8
output_dir = "glycine_output"
