# pKa prediction for glycine using PySCF backend
#
# Three-stage workflow:
#   1. Sampling   — CREST conformer/tautomer/protonation enumeration (GFN2-xTB)
#   2. Refinement — geometry optimization (wB97X-D3BJ/def2-TZVPD + SMD)
#   3. Scoring    — single-point energy + RRHO (wB97M-V/def2-QZVPPD + SMD)

[molecule]
smiles = "NCC(=O)O"
charge_min = -1
charge_max = 1

[sampling]
approach = "rdkit_first"
ewin = 6.0

[refinement]
# PySCF defaults: wB97X-D3BJ / def2-TZVPD / SMD
solvent = "water"
ewin = 10.0

[scoring]
# PySCF defaults: wB97M-V / def2-QZVPPD / SMD
solvent = "water"
ewin = 10.0
rrho_level = "refinement"

[compute]
driver = "pyscf"
threads = 4
output_dir = "glycine_output"
